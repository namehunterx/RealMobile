<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Управления</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .fake-404 { text-align: center; }
        .fake-404 h1 { font-size: 8rem; color: var(--primary); font-family: 'Montserrat'; font-weight: 900; }
        
        /* Логин */
        .login-screen { display: none; position: fixed; inset: 0; background: #080808; z-index: 1000; align-items: center; justify-content: center; }
        .login-box { background: #0f0f0f; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid #1a1a1a; }
        .login-error { background: rgba(227, 28, 37, 0.1); color: var(--primary); padding: 12px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 20px; display: none; text-align: center; border: 1px solid rgba(227, 28, 37, 0.2); }
        
        /* Панель */
        .admin-panel { display: none; position: fixed; inset: 0; background: #080808; z-index: 2000; overflow-y: auto; padding: 30px; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        
        /* Хедер и Виджеты */
        .quick-view { display: flex; gap: 15px; margin-bottom: 30px; }
        .q-card { background: #0f0f0f; padding: 15px 25px; border-radius: 16px; border: 1px solid #1a1a1a; flex: 1; text-align: center; }
        .q-card span { display: block; font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .q-card b { font-size: 1.4rem; font-family: 'Montserrat'; }

        /* Вкладки */
        .admin-tabs { display: flex; gap: 5px; background: #0f0f0f; padding: 5px; border-radius: 12px; border: 1px solid #1a1a1a; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #555; cursor: pointer; font-weight: 700; font-size: 0.8rem; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: #1a1a1a; color: var(--primary); }

        .tab-content { display: none; }
        .admin-card { background: #0f0f0f; padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        .admin-card h3 { font-size: 0.9rem; margin-bottom: 20px; color: var(--primary); font-family: 'Montserrat'; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; color: #555; text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        .form-input { width: 100%; padding: 14px; background: #050505; border: 1px solid #1a1a1a; border-radius: 10px; color: #fff; font-family: inherit; transition: 0.3s; }
        .form-input:focus { border-color: var(--primary); outline: none; background: #080808; }

        /* Статус кнопки */
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .status-btn { padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a; background: #0c0c0c; color: #fff; cursor: pointer; transition: 0.3s; font-weight: 800; font-size: 0.7rem; }
        .status-btn.active { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Команда */
        .team-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0c0c0c; border-radius: 14px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .role-owner { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .role-dev { color: var(--primary); }

        .save-status { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 30px; background: var(--primary); color: #fff; border-radius: 50px; font-weight: 800; font-size: 0.8rem; transition: 0.5s; z-index: 5000; box-shadow: 0 10px 30px rgba(227, 28, 37, 0.4); }
        .save-status.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="fake-404" id="fake404">
    <h1>404</h1>
    <p>Указанный адрес не существует. <a href="index.html" style="color:var(--primary)">Вернуться</a></p>
</div>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2 style="text-align:center; margin-bottom:30px; font-family:'Montserrat'; letter-spacing:-1px;">CORE <span style="color:var(--primary)">ACCESS</span></h2>
        <div class="login-error" id="loginError"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>System Login</label>
                <input type="text" class="form-input" id="loginUser" required placeholder="dev_id">
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" class="form-input" id="loginPass" required placeholder="********">
            </div>
            <div class="form-group">
                <label>Access PIN</label>
                <input type="password" class="form-input" id="loginPin" maxlength="4" required placeholder="0000">
            </div>
            <button type="submit" class="btn btn-red" style="width:100%; padding:16px;">AUTH_EXECUTE</button>
        </form>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="admin-container">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 style="font-family:'Montserrat'; font-size:1.2rem; letter-spacing:1px;">REAL MOBILE // <span style="color:var(--primary)">ADMIN_PANEL</span></h1>
            <button class="btn btn-outline" style="font-size:0.7rem;" onclick="logout()">LOGOUT</button>
        </div>

        <div class="quick-view">
            <div class="q-card"><span>LIVE_ONLINE</span><b id="qsOnline">0</b></div>
            <div class="q-card"><span>SRV_STATUS</span><b id="qsStatus">...</b></div>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab-server')">СЕРВЕР</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-stats')">СТАТИСТИКА</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-team')">КОМАНДА</button>
        </div>

        <div id="tab-server" class="tab-content" style="display:block;">
            <div class="admin-card">
                <h3>Режим работы</h3>
                <div class="status-grid" id="statusGrid"></div>
            </div>
            <div class="admin-card">
                <h3>Контроль населения</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label>Игроков в сети</label>
                        <input type="number" class="form-input" id="cfgOnline">
                    </div>
                    <div class="form-group">
                        <label>Максимум слотов</label>
                        <input type="number" class="form-input" id="cfgSlots">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label>Пинг (ms)</label>
                        <input type="number" class="form-input" id="cfgPing">
                    </div>
                    <div class="form-group">
                        <label>Название города</label>
                        <input type="text" class="form-input" id="cfgServerName">
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="admin-card">
                <h3>Глобальные показатели</h3>
                <div class="form-group"><label>Всего аккаунтов</label><input type="text" class="form-input" id="cfgAccounts"></div>
                <div class="form-group"><label>Всего машин</label><input type="text" class="form-input" id="cfgCars"></div>
                <div class="form-group"><label>Всего домов</label><input type="text" class="form-input" id="cfgHouses"></div>
                <div class="form-group"><label>Всего работ</label><input type="text" class="form-input" id="cfgJobs"></div>
                <div class="form-group"><label>Версия клиента</label><input type="text" class="form-input" id="cfgVersion"></div>
            </div>
        </div>

        <div id="tab-team" class="tab-content">
            <div class="admin-card">
                <h3>Допуск персонала</h3>
                <button class="btn btn-red" onclick="createDev()">➕ ВЫДАТЬ НОВЫЙ ДОСТУП</button>
            </div>
            <div id="adminList"></div>
        </div>

    </div>
</div>

<div id="saveStatus" class="save-status">CORE_SYNC_SUCCESS</div>

<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
